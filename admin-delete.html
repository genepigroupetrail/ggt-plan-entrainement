<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGT — Supprimer Adhérent</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .delete-container {
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .delete-card {
      background: var(--surf);
      border: 0.5px solid var(--brd);
      border-radius: 14px;
      padding: 30px;
    }

    .delete-card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--txt);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--mut);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      background: var(--surf2);
      border: 0.5px solid var(--brd);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--txt);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--acc);
    }

    .warning-box {
      background: rgba(245,158,11,.15);
      border: 0.5px solid rgba(245,158,11,.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 20px 0;
      font-size: 12px;
      color: var(--amb);
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 10px 16px;
      border-radius: 6px;
      background: var(--surf2);
      border: 0.5px solid var(--brd);
      color: var(--txt);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-cancel:hover {
      border-color: var(--acc);
    }

    .btn-delete {
      padding: 10px 16px;
      border-radius: 6px;
      background: var(--red);
      border: none;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-delete:hover {
      opacity: 0.9;
    }

    .btn-delete:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-msg {
      background: rgba(34,197,94,.15);
      border: 0.5px solid rgba(34,197,94,.4);
      color: var(--grn);
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .error-msg {
      background: rgba(224,0,32,.15);
      border: 0.5px solid rgba(224,0,32,.4);
      color: #ff6b6b;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .info-msg {
      background: rgba(79,142,247,.08);
      border: 0.5px solid rgba(79,142,247,.2);
      color: var(--acc);
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo-ggt.png" alt="GGT">
      <div><h1>Supprimer Adhérent</h1><p>Génépi Groupe Trail</p></div>
    </div>
    <div class="header-right">
      <a href="admin-adherents.html" class="btn-h">← Retour Adhérents</a>
      <button class="btn-h" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div class="delete-container">
    <div id="success-msg" class="success-msg">✅ Adhérent supprimé de Firestore</div>
    <div id="error-msg" class="error-msg"></div>
    <div id="info-msg" class="info-msg"></div>

    <div class="delete-card">
      <h2>🗑️ Supprimer un Adhérent</h2>

      <div class="warning-box">
        ⚠️ <strong>ATTENTION:</strong> Ceci supprime l'adhérent de Firestore (users, VMA, suivi).<br><br>Vous devrez supprimer manuellement de Firebase Authentication (2 clics).
      </div>

      <div class="form-group">
        <label>Email de l'adhérent à supprimer</label>
        <input type="email" id="email-input" placeholder="exemple@ggt.fr">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="window.location.href='admin-adherents.html'">Annuler</button>
        <button class="btn-delete" id="delete-btn" onclick="deleteUser()">🗑️ Supprimer</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, deleteDoc, collection, query, where, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBfyEpytc8VEJ1sdJeCY2Imx5WAu-YazYI",
      authDomain: "ggt-plan-entrainement.firebaseapp.com",
      projectId: "ggt-plan-entrainement",
      storageBucket: "ggt-plan-entrainement.appspot.com",
      messagingSenderId: "1084549573822",
      appId: "1:1084549573822:web:7f4fc2bb84d1c987e6c9f7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        if (!userSnap.exists()) {
          window.location.href = 'index.html';
          return;
        }

        const userRole = userSnap.data().role;
        if (!['admin', 'adhérentadmin'].includes(userRole)) {
          window.location.href = 'planning.html';
          return;
        }
      } catch (error) {
        console.error('Erreur:', error);
        window.location.href = 'index.html';
      }
    });

    window.deleteUser = async function() {
      const email = document.getElementById('email-input').value.trim();

      if (!email) {
        showError('Veuillez entrer un email');
        return;
      }

      if (!confirm('⚠️ Êtes-vous sûr de vouloir supprimer: ' + email + '?')) {
        return;
      }

      document.getElementById('delete-btn').disabled = true;
      showInfo('Suppression en cours...');

      try {
        // Trouver l'UID par email
        const usersQuery = query(collection(db, 'users'), where('email', '==', email));
        const snapshot = await getDocs(usersQuery);

        if (snapshot.empty) {
          showError('Aucun adhérent trouvé avec cet email');
          document.getElementById('delete-btn').disabled = false;
          return;
        }

        const uid = snapshot.docs[0].id;

        // Utiliser batch pour supprimer
        const batch = writeBatch(db);
        
        // Supprimer users
        batch.delete(doc(db, 'users', uid));
        
        // Supprimer vma_data
        batch.delete(doc(db, 'vma_data', uid));
        
        // Supprimer race_suivi: récupérer TOUS, filtrer en JS, ajouter au batch
        const allRaceSuivi = await getDocs(collection(db, 'race_suivi'));
        let countRaceSuivi = 0;
        allRaceSuivi.forEach(d => {
          if (d.id.startsWith(uid + '_')) {
            batch.delete(d.ref);
            countRaceSuivi++;
          }
        });
        
        // Exécuter le batch
        await batch.commit();

        showSuccess(`Adhérent supprimé complètement! (${countRaceSuivi} suivi(s) effacé(s))`);
        document.getElementById('email-input').value = '';
        
        setTimeout(() => window.location.href = 'admin-adherents.html', 2000);

      } catch (error) {
        console.error('Erreur:', error);
        showError('Erreur: ' + error.message);
        document.getElementById('delete-btn').disabled = false;
      }
    };

    window.logout = async function() {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
      document.getElementById('info-msg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = '✅ ' + msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('info-msg').style.display = 'none';
    }

    function showInfo(msg) {
      const el = document.getElementById('info-msg');
      el.textContent = 'ℹ️ ' + msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('success-msg').style.display = 'none';
    }
  </script>
</body>
</html>
