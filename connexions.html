<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGT — Connexions</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-title {
      font-size: 20px;
      font-weight: var(--font-weight-bold);
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 13px;
      color: var(--mut);
      margin-bottom: 24px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stats-bar {
      display: contents;
    }

    .stat-card {
      background: var(--surf);
      border: 0.5px solid var(--brd);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }

    .stat-val {
      font-size: 24px;
      font-weight: var(--font-weight-bold);
      color: var(--acc);
    }

    .stat-label {
      font-size: 11px;
      color: var(--mut);
      margin-top: 2px;
    }

    .count-badge {
      font-size: 12px;
      color: var(--mut);
      margin: 16px 0 0 0;
    }

    .table-wrap {
      background: var(--surf);
      border: 0.5px solid var(--brd);
      border-radius: 12px;
      overflow-x: auto;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .table-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 12px 16px;
      background: var(--surf2);
      border-bottom: 0.5px solid var(--brd);
      font-size: 11px;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mut);
      grid-column: 1 / -1;
    }

    #table-body {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-column: 1 / -1;
    }

    .table-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--brd);
      border-right: 0.5px solid var(--brd);
      font-size: 13px;
      transition: background 0.15s;
    }

    .table-row:nth-child(4n) {
      border-right: none;
    }

    .table-row:last-child {
      border-bottom: none;
    }

    .table-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .table-row .name {
      font-weight: var(--font-weight-medium);
      color: var(--txt);
    }

    .table-row .date {
      color: var(--mut);
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--mut);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--mut);
      font-size: 13px;
    }

    .spin {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--brd);
      border-top: 2px solid var(--acc);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo-ggt.png" alt="GGT">
      <div><h1>GGT Admin</h1><p>CoachDav</p></div>
    </div>
    <div class="header-right">
      <span id="user-name" class="user-badge">...</span>
      <a href="admin.html" class="btn-h">← Admin</a>
      <button class="btn-h" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div class="main">
    <div class="page-title">👥 Connexions des adhérents</div>
    <div class="page-sub">6 derniers mois</div>

    <div class="content-grid">
      <!-- STATS (4 colonnes) -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-val" id="stat-total">—</div>
          <div class="stat-label">Connexions totales</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-users">—</div>
          <div class="stat-label">Adhérents actifs</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-today">—</div>
          <div class="stat-label">Aujourd'hui</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-week">—</div>
          <div class="stat-label">Cette semaine</div>
        </div>
      </div>
    </div>

    <!-- TABLEAU (EN DEHORS du grid, largeur max comme stats) -->
    <div class="table-wrap">
      <div class="table-header">
        <div>Adhérent</div>
        <div>Date &amp; heure</div>
      </div>
      <div id="table-body">
        <div class="loading">
          <div class="spin"></div>
          Chargement...
        </div>
      </div>
    </div>

    <!-- COMPTEUR -->
    <div class="count-badge" id="count-badge">—</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig, formatDateTime, getTodayUTC, getUserDisplayName } from "./shared-app.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ==================== FONCTIONS ====================

    async function loadConnexions() {
      try {
        console.log('Chargement des connexions...');

        // 1. Charger TOUS les documents de la collection connexions
        const snap = await getDocs(collection(db, 'connexions'));
        const allDocs = [];
        const toDelete = [];

        // 2. Filtrer: garder les moins de 6 mois, supprimer les autres
        const sixMonthsAgo = new Date();
        sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
        const cutoff = Timestamp.fromDate(sixMonthsAgo);

        snap.forEach(function(d) {
          const data = d.data();
          const timestamp = data.ts;
          
          if (timestamp && timestamp.toMillis && timestamp.toMillis() < cutoff.toMillis()) {
            // Trop vieux → supprimer en arrière-plan
            toDelete.push(d.id);
          } else {
            // Garder
            allDocs.push({
              id: d.id,
              uid: data.uid || '',
              nom: data.nom || '—',
              ts: timestamp
            });
          }
        });

        console.log('Documents chargés:', allDocs.length);

        // 3. Trier par date décroissante (plus récent en premier)
        allDocs.sort(function(a, b) {
          const ta = a.ts && a.ts.toMillis ? a.ts.toMillis() : 0;
          const tb = b.ts && b.ts.toMillis ? b.ts.toMillis() : 0;
          return tb - ta;
        });

        // 4. Supprimer les vieux documents en arrière-plan (sans bloquer)
        if (toDelete.length > 0) {
          toDelete.forEach(function(id) {
            deleteDoc(doc(db, 'connexions', id)).catch(function(e) {
              console.warn('Erreur suppression:', e);
            });
          });
        }

        // 5. Calculer les stats
        const today = getTodayUTC();
        const weekAgo = new Date(today);
        weekAgo.setDate(weekAgo.getDate() - 7);

        const uniqueUsers = new Set(allDocs.map(function(c) { return c.uid; })).size;
        const todayCount = allDocs.filter(function(c) {
          return c.ts && c.ts.toDate && c.ts.toDate() >= today;
        }).length;
        const weekCount = allDocs.filter(function(c) {
          return c.ts && c.ts.toDate && c.ts.toDate() >= weekAgo;
        }).length;

        // 6. Afficher les stats
        document.getElementById('stat-total').textContent = allDocs.length;
        document.getElementById('stat-users').textContent = uniqueUsers;
        document.getElementById('stat-today').textContent = todayCount;
        document.getElementById('stat-week').textContent = weekCount;
        document.getElementById('count-badge').textContent = allDocs.length + ' connexion(s)';

        // 7. Afficher le tableau
        renderTable(allDocs);

      } catch (error) {
        console.error('Erreur loadConnexions:', error);
        document.getElementById('table-body').innerHTML = 
          '<div class="empty"><div class="empty-icon">⚠️</div><p>Erreur: ' + error.message + '</p></div>';
      }
    }

    function renderTable(connexions) {
      const body = document.getElementById('table-body');

      if (!connexions || connexions.length === 0) {
        body.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Aucune connexion.</p></div>';
        return;
      }

      // Charger les noms des utilisateurs
      getDocs(collection(db, 'users')).then(function(usersSnap) {
        const emailToName = {};
        usersSnap.forEach(function(d) {
          const data = d.data();
          const email = data.email || d.id;
          const prenom = data.prenom || '';
          const nom = data.nom || '';
          const displayName = [prenom, nom].filter(Boolean).join(' ') || email;
          emailToName[email] = displayName;
        });

        // Maintenant afficher avec les noms
        let html = '';
        connexions.forEach(function(c) {
          // Traduire email en nom
          const displayName = emailToName[c.nom] || c.nom;
          
          // Échapper le nom pour éviter les injections XSS
          const safeName = displayName.replace(/[&<>"']/g, function(char) {
            const escaped = {
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#039;'
            };
            return escaped[char];
          });

          // Formater la date
          const dateStr = c.ts ? formatDateTime(c.ts) : '—';

          html += `<div class="table-row">
            <div class="name">${safeName}</div>
            <div class="date">${dateStr}</div>
          </div>`;
        });

        body.innerHTML = html;
      }).catch(function(error) {
        console.error('Erreur chargement utilisateurs:', error);
        // Afficher juste les emails si ça échoue
        let html = '';
        connexions.forEach(function(c) {
          const safeName = (c.nom || '—').replace(/[&<>"']/g, function(char) {
            const escaped = {
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#039;'
            };
            return escaped[char];
          });
          const dateStr = c.ts ? formatDateTime(c.ts) : '—';
          html += `<div class="table-row">
            <div class="name">${safeName}</div>
            <div class="date">${dateStr}</div>
          </div>`;
        });
        body.innerHTML = html;
      });
    }

    window.logout = function() {
      signOut(auth).then(function() {
        window.location.href = 'index.html';
      });
    };

    // ==================== INIT ====================

    onAuthStateChanged(auth, async function(user) {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      try {
        // Vérifier que c'est un admin
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        if (!userSnap.exists() || userSnap.data().role !== 'admin') {
          window.location.href = 'planning.html';
          return;
        }

        // Afficher le nom
        document.getElementById('user-name').textContent = getUserDisplayName(userSnap.data(), user.email);

        // Charger les connexions
        await loadConnexions();

      } catch (error) {
        console.error('Erreur auth:', error);
        document.getElementById('table-body').innerHTML = 
          '<div class="empty"><div class="empty-icon">⚠️</div><p>Erreur: ' + error.message + '</p></div>';
      }
    });
  </script>
</body>
</html>
