<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGT — Mon Profil</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .btn-profil {
      background: rgba(168, 116, 255, 0.12);
      border: 0.5px solid rgba(168, 116, 255, 0.3);
      border-radius: 8px;
      padding: 6px 14px;
      color: #a874ff;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-profil:hover {
      background: rgba(168, 116, 255, 0.2);
      border-color: #a874ff;
    }

    .profil-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .profil-card {
      background: var(--surf);
      border: 0.5px solid var(--brd);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .profil-card h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--txt);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--mut);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--surf2);
      border: 0.5px solid var(--brd);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--txt);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
    }

    .form-group input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--acc);
    }

    .form-group input::placeholder {
      color: var(--mut);
    }

    .info-box {
      background: rgba(79,142,247,.08);
      border: .5px solid rgba(79,142,247,.2);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 16px 0;
      font-size: 12px;
      color: var(--acc);
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 8px 16px;
      border-radius: 6px;
      background: var(--surf2);
      border: 0.5px solid var(--brd);
      color: var(--txt);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-cancel:hover {
      border-color: var(--acc);
    }

    .btn-confirm {
      padding: 8px 16px;
      border-radius: 6px;
      background: var(--ora);
      border: none;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-confirm:hover {
      opacity: 0.9;
    }

    .success-msg {
      background: rgba(34,197,94,.15);
      border: .5px solid rgba(34,197,94,.4);
      color: var(--grn);
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .error-msg {
      background: rgba(224,0,32,.15);
      border: .5px solid rgba(224,0,32,.4);
      color: #ff6b6b;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    @media (max-width: 600px) {
      .profil-container {
        margin: 20px auto;
      }

      .profil-card {
        padding: 16px;
      }

      .modal-actions {
        flex-direction: column;
      }

      .btn-cancel,
      .btn-confirm {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo-ggt.png" alt="GGT">
      <div><h1>Mon Profil</h1><p>Génépi Groupe Trail</p></div>
    </div>
    <div class="header-right">
      <span class="user-badge" id="user-name">...</span>
      <a href="planning.html" class="btn-profil">← Retour Planning</a>
      <button class="btn-h" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div class="profil-container">
    <div id="success-msg" class="success-msg">✅ Enregistré avec succès</div>
    <div id="error-msg" class="error-msg"></div>

    <!-- Infos Personnelles -->
    <div class="profil-card">
      <h2>👤 Informations Personnelles</h2>

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" id="prenom" placeholder="Jean">
      </div>

      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="nom" placeholder="Dupont">
      </div>

      <div class="form-group">
        <label>Email (non modifiable)</label>
        <input type="email" id="email" disabled>
      </div>

      <div class="form-group">
        <label>Date de naissance</label>
        <input type="date" id="dob">
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" id="tel" placeholder="06 12 34 56 78">
      </div>

      <div class="form-group">
        <label>Adresse</label>
        <input type="text" id="adresse" placeholder="123 rue de la Paix, 75000 Paris">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="window.location.href='planning.html'">Annuler</button>
        <button class="btn-confirm" onclick="saveProfil()">💾 Enregistrer</button>
      </div>
    </div>

    <!-- Changement Mot de Passe -->
    <div class="profil-card">
      <h2>🔐 Changer le Mot de Passe</h2>

      <div class="info-box">
        ⚠️ <strong>Important:</strong> Si vous oubliez votre nouveau mot de passe, vous perdrez tout accès. Assurez-vous de le noter quelque part de sûr.
      </div>

      <div class="form-group">
        <label>Ancien Mot de Passe</label>
        <input type="password" id="old-password" placeholder="••••••••">
      </div>

      <div class="form-group">
        <label>Nouveau Mot de Passe</label>
        <input type="password" id="new-password" placeholder="••••••••">
      </div>

      <div class="form-group">
        <label>Confirmer Nouveau Mot de Passe</label>
        <input type="password" id="confirm-password" placeholder="••••••••">
      </div>

      <div class="modal-actions">
        <button class="btn-confirm" style="background:var(--ora)" onclick="changePassword()">🔑 Changer le Mot de Passe</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, reauthenticateWithCredential, EmailAuthProvider, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBfyEpytc8VEJ1sdJeCY2Imx5WAu-YazYI",
      authDomain: "ggt-plan-entrainement.firebaseapp.com",
      projectId: "ggt-plan-entrainement",
      storageBucket: "ggt-plan-entrainement.appspot.com",
      messagingSenderId: "1084549573822",
      appId: "1:1084549573822:web:7f4fc2bb84d1c987e6c9f7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (!snap.exists()) {
          window.location.href = 'index.html';
          return;
        }

        currentUser = snap.data();
        
        // Afficher le nom dans le header
        const displayName = (currentUser.prenom || '') + ' ' + (currentUser.nom || '');
        document.getElementById('user-name').textContent = displayName.trim();
        
        // Remplir le formulaire
        document.getElementById('prenom').value = currentUser.prenom || '';
        document.getElementById('nom').value = currentUser.nom || '';
        document.getElementById('email').value = currentUser.email || '';
        document.getElementById('dob').value = currentUser.dob || '';
        document.getElementById('tel').value = currentUser.tel || '';
        document.getElementById('adresse').value = currentUser.adresse || '';

      } catch (error) {
        console.error('Erreur:', error);
        showError('Erreur de chargement');
      }
    });

    window.saveProfil = async function() {
      try {
        const user = auth.currentUser;
        if (!user) return;

        const prenom = document.getElementById('prenom').value.trim();
        const nom = document.getElementById('nom').value.trim();
        const dob = document.getElementById('dob').value;
        const tel = document.getElementById('tel').value.trim();
        const adresse = document.getElementById('adresse').value.trim();

        if (!prenom || !nom) {
          showError('Prénom et Nom sont obligatoires');
          return;
        }

        await updateDoc(doc(db, 'users', user.uid), {
          prenom, nom, dob, tel, adresse
        });

        showSuccess('Profil mis à jour avec succès');
      } catch (error) {
        console.error('Erreur:', error);
        showError('Erreur: ' + error.message);
      }
    };

    window.changePassword = async function() {
      try {
        const user = auth.currentUser;
        if (!user) return;

        const oldPassword = document.getElementById('old-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (!oldPassword || !newPassword || !confirmPassword) {
          showError('Tous les champs sont obligatoires');
          return;
        }

        if (newPassword !== confirmPassword) {
          showError('Les nouveaux mots de passe ne correspondent pas');
          return;
        }

        if (newPassword.length < 6) {
          showError('Le mot de passe doit contenir au moins 6 caractères');
          return;
        }

        if (newPassword === oldPassword) {
          showError('Le nouveau mot de passe doit être différent de l\'ancien');
          return;
        }

        // Réauthentifier avec l'ancien mot de passe
        const credential = EmailAuthProvider.credential(user.email, oldPassword);
        await reauthenticateWithCredential(user, credential);

        // Changer le mot de passe
        await updatePassword(user, newPassword);

        // Vider les champs
        document.getElementById('old-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';

        showSuccess('Mot de passe changé avec succès!');
      } catch (error) {
        console.error('Erreur:', error);
        
        if (error.code === 'auth/wrong-password') {
          showError('Ancien mot de passe incorrect');
        } else if (error.code === 'auth/weak-password') {
          showError('Le mot de passe est trop faible');
        } else {
          showError('Erreur: ' + error.message);
        }
      }
    };

    window.logout = async function() {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = '✅ ' + msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      setTimeout(() => {
        el.style.display = 'none';
      }, 5000);
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }
  </script>
</body>
</html>
